# Simplified P2P NAT Test Environment
#
# This simpler setup uses a single bridge network with the relay server
# and test nodes. While not a true NAT simulation, it's useful for:
# - Testing relay functionality
# - Testing file transfer protocol
# - Verifying DCUtR negotiation flows
#
# For true NAT testing, use docker-compose.nat.yml

services:
  # ============================================
  # PUBLIC RELAY SERVER
  # ============================================
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    command: relay-server --port 4001 --bind 0.0.0.0
    container_name: p2p-relay
    environment:
      - RUST_LOG=info,libp2p=debug
    networks:
      p2p-network:
        ipv4_address: 172.28.0.10
    ports:
      - "4001:4001"

  # ============================================
  # NODE A (file sharer)
  # ============================================
  node-a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-node-a
    depends_on:
      - relay
    environment:
      - RUST_LOG=info,libp2p=debug
    networks:
      p2p-network:
        ipv4_address: 172.28.0.20
    volumes:
      - ./test-files:/data:ro
    stdin_open: true
    tty: true
    # Default to waiting - override with docker-compose run
    command: test-node --name node-a wait

  # ============================================
  # NODE B (file fetcher)
  # ============================================
  node-b:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-node-b
    depends_on:
      - relay
    environment:
      - RUST_LOG=info,libp2p=debug
    networks:
      p2p-network:
        ipv4_address: 172.28.0.30
    stdin_open: true
    tty: true
    command: test-node --name node-b wait

networks:
  p2p-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
