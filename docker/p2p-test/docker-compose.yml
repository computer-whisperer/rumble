# P2P NAT Traversal Test Environment
#
# Network topology:
#
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ                    public (10.99.0.0/24)                     в”Ӯ
#   в”Ӯ                                                              в”Ӯ
#   в”Ӯ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                           в”Ӯ
#   в”Ӯ    в”Ӯ   relay     в”Ӯ 10.99.0.10:4001                           в”Ӯ
#   в”Ӯ    в”Ӯ  (public)   в”Ӯ                                           в”Ӯ
#   в”Ӯ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                           в”Ӯ
#   в”Ӯ          в”Ӯ                                                   в”Ӯ
#   в”Ӯ    в”Ңв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”җ                                             в”Ӯ
#   в”Ӯ    в”Ӯ           в”Ӯ                                             в”Ӯ
#   в”Ӯ в”Ңв”Җв”Җв”ҙв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”ҙв”Җв”Җв”җ                                          в”Ӯ
#   в”Ӯ в”Ӯnat-a в”Ӯ   в”Ӯnat-b в”Ӯ  NAT routers                             в”Ӯ
#   в”Ӯ в”Ӯ10.99.в”Ӯ   в”Ӯ10.99.в”Ӯ  (iptables masquerade)                   в”Ӯ
#   в”Ӯ в”Ӯ0.20  в”Ӯ   в”Ӯ0.30  в”Ӯ                                          в”Ӯ
#   в”Ӯ в””в”Җв”Җв”¬в”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”¬в”Җв”Җв”ҳ                                          в”Ӯ
#   в”Ӯ    в”Ӯ           в”Ӯ                                             в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#        в”Ӯ           в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ
#   в”Ӯprivate-aв”Ӯ в”Ӯprivate-bв”Ӯ
#   в”Ӯ10.99.1. в”Ӯ в”Ӯ10.99.2. в”Ӯ
#   в”Ӯ0/24     в”Ӯ в”Ӯ0/24     в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”ҳ
#        в”Ӯ           в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ node-a  в”Ӯ в”Ӯ node-b  в”Ӯ
#   в”Ӯ10.99.1. в”Ӯ в”Ӯ10.99.2. в”Ӯ
#   в”Ӯ100      в”Ӯ в”Ӯ100      в”Ӯ
#   в”Ӯ(behind  в”Ӯ в”Ӯ(behind  в”Ӯ
#   в”Ӯ NAT)    в”Ӯ в”Ӯ NAT)    в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# This setup simulates two peers behind separate NATs trying to
# communicate via a public relay with hole punching.

services:
  # ============================================
  # PUBLIC RELAY SERVER
  # ============================================
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    command: relay-server --port 4001 --bind 0.0.0.0
    environment:
      - RUST_LOG=info,libp2p=debug
    networks:
      public:
        ipv4_address: 10.99.0.10
        ipv6_address: fd00:99:0::10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/", "||", "exit", "0"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # NAT ROUTER A (for node-a)
  # ============================================
  nat-a:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache iptables iproute2 &&
        PUBLIC_IF=$$(ip -o addr | grep 10.99.0 | awk '{print $$2}') &&
        PRIVATE_IF=$$(ip -o addr | grep 10.99.1 | awk '{print $$2}') &&
        echo Using PUBLIC_IF=$$PUBLIC_IF PRIVATE_IF=$$PRIVATE_IF &&
        iptables -t nat -A POSTROUTING -o $$PUBLIC_IF -j MASQUERADE &&
        iptables -A FORWARD -i $$PRIVATE_IF -o $$PUBLIC_IF -j ACCEPT &&
        iptables -A FORWARD -i $$PUBLIC_IF -o $$PRIVATE_IF -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        echo 'NAT-A router ready' &&
        tail -f /dev/null
      "
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      public:
        ipv4_address: 10.99.0.20
        ipv6_address: fd00:99:0::20
      private-a:
        ipv4_address: 10.99.1.2
        ipv6_address: fd00:99:1::2

  # ============================================
  # NAT ROUTER B (for node-b)
  # ============================================
  nat-b:
    image: alpine:latest
    command: >
      sh -c "
        apk add --no-cache iptables iproute2 &&
        PUBLIC_IF=$$(ip -o addr | grep 10.99.0 | awk '{print $$2}') &&
        PRIVATE_IF=$$(ip -o addr | grep 10.99.2 | awk '{print $$2}') &&
        echo Using PUBLIC_IF=$$PUBLIC_IF PRIVATE_IF=$$PRIVATE_IF &&
        iptables -t nat -A POSTROUTING -o $$PUBLIC_IF -j MASQUERADE &&
        iptables -A FORWARD -i $$PRIVATE_IF -o $$PUBLIC_IF -j ACCEPT &&
        iptables -A FORWARD -i $$PUBLIC_IF -o $$PRIVATE_IF -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        echo 'NAT-B router ready' &&
        tail -f /dev/null
      "
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      public:
        ipv4_address: 10.99.0.30
        ipv6_address: fd00:99:0::30
      private-b:
        ipv4_address: 10.99.2.2
        ipv6_address: fd00:99:2::2

  # ============================================
  # NODE A (behind NAT-A, will share file)
  # ============================================
  node-a:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - relay
      - nat-a
    cap_add:
      - NET_ADMIN
    environment:
      - RUST_LOG=info,libp2p=debug
      - NODE_NAME=node-a
    networks:
      private-a:
        ipv4_address: 10.99.1.100
        ipv6_address: fd00:99:1::100
    volumes:
      - ./test-files:/data
    # Route through NAT
    dns: []
    entrypoint: >
      sh -c "
        ip route del default 2>/dev/null || true
        ip route add default via 10.99.1.2
        echo 'Node A starting...'
        exec test-node --name node-a --relay /ip4/10.99.0.10/tcp/4001/p2p/$$RELAY_PEER_ID --relay-listen share --file /data/test.txt
      "

  # ============================================
  # NODE B (behind NAT-B, will fetch file)
  # ============================================
  node-b:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - relay
      - nat-b
    cap_add:
      - NET_ADMIN
    environment:
      - RUST_LOG=info,libp2p=debug
      - NODE_NAME=node-b
    networks:
      private-b:
        ipv4_address: 10.99.2.100
        ipv6_address: fd00:99:2::100
    # Route through NAT
    dns: []
    entrypoint: >
      sh -c "
        ip route del default 2>/dev/null || true
        ip route add default via 10.99.2.2
        echo 'Node B starting...'
        exec test-node --name node-b --relay /ip4/10.99.0.10/tcp/4001/p2p/$$RELAY_PEER_ID --relay-listen wait
      "

networks:
  # Public network (internet simulation) with IPv6
  public:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.99.0.0/24
          gateway: 10.99.0.1
        - subnet: fd00:99:0::/64
          gateway: fd00:99:0::1

  # Private network behind NAT-A with IPv6
  private-a:
    driver: bridge
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.99.1.0/24
        - subnet: fd00:99:1::/64

  # Private network behind NAT-B with IPv6
  private-b:
    driver: bridge
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.99.2.0/24
        - subnet: fd00:99:2::/64
